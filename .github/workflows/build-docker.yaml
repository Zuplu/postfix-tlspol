name: 🚀 Build and Deploy Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY_IMAGE: "zuplu/postfix-tlspol"

permissions: read-all

jobs:
  test:
    name: 🧪 Unit Testing
    uses: ./.github/workflows/go-test.yaml

  metadata:
    name: 📊 Synthesize Docker Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ toJSON(steps.metadata.outputs.version) }}
      tags: ${{ toJSON(steps.metadata.outputs.tags) }}
      labels: ${{ toJSON(steps.metadata.outputs.labels) }}
      annotations: ${{ toJSON(steps.metadata.outputs.annotations) }}
      json: ${{ toJSON(steps.metadata.outputs.json) }}
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: ✨ Detect Version Tag
        run: |
          VERSION="$(git describe --tags --abbrev=0 --match 'v*')"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          BRANCH="$(git branch --show-current)"
          IS_LATEST="false"
          if [ "$BRANCH" = "main" ]; then
            NEW_COMMITS="$(git rev-list HEAD...@{upstream} --count)"
            if [ "$NEW_COMMITS" -eq 0 ]; then
              IS_LATEST="true"
            fi
          fi
          echo "IS_LATEST=$IS_LATEST" >> "$GITHUB_ENV"

      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # pin@v5
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          context: git
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ env.VERSION }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ env.VERSION }}
            type=semver,pattern=v{{major}},value=${{ env.VERSION }}
            type=raw,value=latest,enable=${{ env.IS_LATEST }}

  build:
    name: 🚧 Build Docker Images
    needs: [test, metadata]
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/amd64/v2
          - linux/amd64/v3
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64
          - linux/386
          - linux/ppc64le
          - linux/riscv64
          - linux/s390x
    runs-on: ubuntu-latest
    steps:
      - name: 📑 Prepare environment
        run: |
          PLATFORM="$(echo "${{ matrix.platform }}" | tr '/' '-')"
          echo "PLATFORM=$PLATFORM" >> "$GITHUB_ENV"

      - name: 📦 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v4

      - name: ⚙️ Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # pin@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # pin@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # pin@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build platform-specific Docker image 🚧
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # pin@v6
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          platforms: ${{ matrix.platform }}
          build-args: |
            GITHUB_ACTIONS=1
            VERSION=${{ fromJSON(fromJSON(needs.metadata.outputs.json)).labels['org.opencontainers.image.version'] }}
          context: .
          file: deployments/Dockerfile
          push: true
          sbom: true
          provenance: true
          labels: ${{ fromJSON(needs.metadata.outputs.labels) }}
          annotations: ${{ fromJSON(needs.metadata.outputs.annotations) }}
          outputs: type=image,"name=${{ env.REGISTRY_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM }}
          cache-from: type=gha,scope=${{ env.PLATFORM }}

      - name: 📄 Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: 📤 Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # pin@v4
        with:
          name: digest-${{ env.PLATFORM }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  bundle:
    name: 📦 Bundle and Deploy ✨
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    env:
      METADATA: ${{ fromJSON(needs.metadata.outputs.json) }}
    steps:
      - name: 📥 Download digests
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # pin@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # pin@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ✨ Bundle and push manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          DIGEST="$(docker buildx imagetools create --progress rawjson \
            $(jq -r '.tags | map("-t \(.)") | join(" ")' <<< "$METADATA") \
            $(printf "${{ env.REGISTRY_IMAGE }}@sha256:%s " *) 2>&1 | \
            jq -r 'select(has("logs")) | .logs[].data | @base64d | match("sha256:[a-f0-9]{64}").string' | tail -n1)"
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"

      - name: 🔏 Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # pin@v2
        id: attest
        with:
          subject-name: index.docker.io/${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: false
