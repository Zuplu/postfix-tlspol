# postfix-tlspol configuration file

server:
  # server:port to listen as a socketmap server
  # or unix:/run/postfix-tlspol/tlspol.sock for Unix Domain Socket
  # this line is ignored when systemd socket activation is used (default)
  address: 127.0.0.1:8642

  # socket file permissions if Unix Domain Sockets are used
  socket-permissions: 0666

  # log level (debug, info, warn, error)
  log-level: info
  # log format (text, json)
  log-format: text

  # prefetch when TTL is about to expire
  prefetch: true

  # cache file (a sibling file stats.db is also created)
  cache-file: /var/lib/postfix-tlspol/cache.db

dns:
  # must support DNSSEC, uses /etc/resolv.conf if unset
  # should point to the same server as your postfix instance's
  # dns server to avoid discrepancies
  #address: 127.0.0.53:53
